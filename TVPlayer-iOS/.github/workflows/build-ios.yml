name: Build iOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          ls -la *.xcodeproj

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build archive (unsigned)
        run: |
          xcodebuild -project TVPlayer.xcodeproj \
            -scheme TVPlayer_iOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/TVPlayer.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

      - name: Package IPA
        run: |
          # 从 .xcarchive 直接打包为 IPA
          APP_PATH="$RUNNER_TEMP/TVPlayer.xcarchive/Products/Applications/TVPlayer.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: TVPlayer.app not found"
            find $RUNNER_TEMP/TVPlayer.xcarchive -name "*.app"
            exit 1
          fi
          
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/"
          
          cd $RUNNER_TEMP
          zip -r TVPlayer.zip Payload
          mv TVPlayer.zip TVPlayer.ipa
          
          echo "IPA created: TVPlayer.ipa"
          ls -lh TVPlayer.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS
          path: ${{ runner.temp }}/TVPlayer.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ runner.temp }}/TVPlayer.ipa
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
