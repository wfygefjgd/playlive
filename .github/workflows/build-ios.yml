name: Build iOS App

on:
  push:
    tags:
      - 'v*-ios'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: TVPlayer-iOS
        run: xcodegen generate

      - name: Build iOS App
        working-directory: TVPlayer-iOS
        run: |
          xcodebuild \
            -project TVPlayer.xcodeproj \
            -scheme TVPlayer_iOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/TVPlayer.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Get version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            VERSION=${VERSION%-ios}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            # 从 project.yml 读取版本号
            VERSION=$(grep "MARKETING_VERSION:" TVPlayer-iOS/project.yml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Export IPA
        working-directory: TVPlayer-iOS
        run: |
          mkdir -p build/Payload
          cp -r build/TVPlayer.xcarchive/Products/Applications/TVPlayer_iOS.app build/Payload/
          cd build
          zip -r TVPlayer-v${{ steps.get_version.outputs.version }}-ios.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS
          path: TVPlayer-iOS/build/TVPlayer-v${{ steps.get_version.outputs.version }}-ios.ipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: TVPlayer-iOS/build/TVPlayer-v${{ steps.get_version.outputs.version }}-ios.ipa
          body: |
            # TVPlayer iOS v${{ steps.get_version.outputs.version }}

            ## 🎉 主要功能

            - ✅ 完善的播放引擎 (PlayerEngine)
            - ✅ 静音检测与自动切换
            - ✅ 网络并发竞速加载
            - ✅ 智能卡顿检测
            - ✅ 键盘快捷键支持 (iPad)
            - ✅ 后台音频播放
            - ✅ 锁屏控制

            ## 📦 安装说明

            1. 下载 TVPlayer-v${{ steps.get_version.outputs.version }}-ios.ipa
            2. 使用 Sideloadly 或 AltStore 侧载安装
            3. 系统要求: iOS 16.0+

            ## ⚠️ 注意

            免费 Apple ID 签名每 7 天需重签一次

            详见: RELEASE_NOTES_iOS_v${{ steps.get_version.outputs.version }}.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
