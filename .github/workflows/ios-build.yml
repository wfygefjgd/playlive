name: Build TVPlayer iOS

on:
  push:
    branches: [ main, master, ios ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: TVPlayer-iOS

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Archive
        run: |
          xcodebuild \
            -project TVPlayer.xcodeproj \
            -scheme TVPlayer_iOS \
            -configuration Debug \
            -sdk iphoneos \
            -derivedDataPath "${{ github.workspace }}/Build" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Export .app as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS-app
          path: ${{ github.workspace }}/Build/Build/Products/Debug-iphoneos/*.app
          retention-days: 7
