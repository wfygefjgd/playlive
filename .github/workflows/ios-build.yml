name: Build TVPlayer iOS

on:
  push:
    branches: [ main, master, ios ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: TVPlayer-iOS

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project TVPlayer.xcodeproj \
            -scheme TVPlayer_iOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ github.workspace }}/Build" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .ipa
        run: |
          mkdir -p "${{ github.workspace }}/Payload"
          cp -R "${{ github.workspace }}/Build/Build/Products/Release-iphoneos/TVPlayer_iOS.app" "${{ github.workspace }}/Payload/"
          cd "${{ github.workspace }}"
          zip -r TVPlayer_iOS.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS-ipa
          path: ${{ github.workspace }}/TVPlayer_iOS.ipa
          retention-days: 7
