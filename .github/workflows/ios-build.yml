name: iOS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'TVPlayer-iOS/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'TVPlayer-iOS/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15

    defaults:
      run:
        working-directory: TVPlayer-iOS

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select latest Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | grep -v "Xcode_15" | sort -V | tail -1)
          if [ -z "$XCODE" ]; then
            XCODE=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          fi
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project TVPlayer.xcodeproj \
            -scheme TVPlayer_iOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ github.workspace }}/Build" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=1.4.3 \
            CURRENT_PROJECT_VERSION=29 \
            build

      - name: Verify app version in Info.plist
        run: |
          APP="${{ github.workspace }}/Build/Build/Products/Release-iphoneos/TVPlayer_iOS.app"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Info.plist"
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP/Info.plist"
          VER=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP/Info.plist")
          test "$VER" = "1.4.3"

      - name: Package .ipa
        run: |
          mkdir -p "${{ github.workspace }}/Payload"
          cp -R "${{ github.workspace }}/Build/Build/Products/Release-iphoneos/TVPlayer_iOS.app" "${{ github.workspace }}/Payload/"
          cd "${{ github.workspace }}"
          zip -r TVPlayer_iOS.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS-ipa
          path: ${{ github.workspace }}/TVPlayer_iOS.ipa
          retention-days: 7