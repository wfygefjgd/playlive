name: iOS Build

on:
  push:
    branches: [main, master]
    paths:
      - 'TVPlayer-iOS/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'TVPlayer-iOS/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd TVPlayer-iOS && xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -project "TVPlayer-iOS/TVPlayer.xcodeproj" \
            -scheme "TVPlayer_iOS" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "${{ github.workspace }}/Build" \
            CODE_SIGNING_ALLOWED="NO" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package .ipa
        run: |
          mkdir -p "${{ github.workspace }}/Payload"
          cp -R "${{ github.workspace }}/Build/Build/Products/Release-iphoneos/TVPlayer_iOS.app" "${{ github.workspace }}/Payload/"
          cd "${{ github.workspace }}"
          zip -r TVPlayer_iOS.ipa Payload/

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-iOS-ipa
          path: ${{ github.workspace }}/TVPlayer_iOS.ipa
          retention-days: 7