name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          
      - name: Force python3 to point to 3.9 (override system 3.14)
        run: |
          PY=$(which python3)
          echo "setup-python python3 = $PY"
          python3 --version
          sudo update-alternatives --install /usr/bin/python3 python3 "$PY" 99
          sudo update-alternatives --set python3 "$PY"
          # also override plain python if it exists
          sudo update-alternatives --install /usr/bin/python python "$PY" 99 2>/dev/null || true
          sudo update-alternatives --set python "$PY" 2>/dev/null || true
          python3 --version
          
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf automake libtool libltdl-dev pkg-config ccache curl
          python3 -m pip install --upgrade pip
          python3 -m pip install "buildozer==1.5.0" "cython==0.29.33" "kivy==2.2.1"
          
      - name: Pre-clone python-for-android to /opt/p4a
        run: |
          sudo git clone --depth 1 -b master https://github.com/kivy/python-for-android.git /opt/p4a
          sudo chmod -R 777 /opt/p4a
          
      - name: Set up Android SDK manually
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSL -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools.zip
          mv cmdline-tools latest
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          # Symlink for buildozer compatibility (old tools/bin layout)
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_ENV
          
      - name: Build with Buildozer
        run: |
          export JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))
          export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
          export ACLOCAL_PATH=/usr/share/aclocal
          echo "python3 = $(which python3) ; version = $(python3 --version)"
          export BUILDOZER_WARN_ON_ROOT=0
          python3 -m buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ACLOCAL_PATH: /usr/share/aclocal
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TVPlayer-APK
          path: bin/*.apk
          if-no-files-found: warn
